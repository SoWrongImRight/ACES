  - id: structural-hit
    name: Structural Hit
    cp_cost: 1
    trigger: "After an opponent deals damage."
    text: "That opponent takes 1 damage."

  - id: radar-spoof
    name: Radar Spoof
    cp_cost: 1
    trigger: "When an opponent gains an attack bonus from a pilot or tactic."
    text: "Reduce that bonus by 1."

  - id: crosswind
    name: Crosswind
    cp_cost: 1
    trigger: "When combat begins."
    text: "Both aircraft get -1 evasion for this combat."
